<!DOCTYPE html>
<html lang="en">
  <head>
  <!-- Standard Meta -->
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

  <!-- Site Properties -->
  <title>Li Hui's academic homepage</title>
  <link rel="stylesheet" type="text/css" href="semantic.css">
  <link href="malos/stylesheets/pandoc-code-highlight.css" rel="stylesheet" type="text/css" />
  <link rel="stylesheet" href="bibstyle.css">
  <link rel='stylesheet prefetch' href='https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.4.1/components/icon.min.css'>
  <script src="jquery-3.2.1.js"></script>
  <script src="semantic.min.js"></script>
  <script> var jq200 = $.noConflict(); </script>
  <script src="library/iframe.js"></script>
  <script src="components/accordion.js"></script>

  <style>
    body {
      padding: 40px;
      background: #fafafa;
      overflow-y: scroll;
    }

    .bib-main-container {
      max-width: 1000px;
      width: 100%;
      margin: 0 auto;
      min-width: 800px;
      display: block;
    }

    .group-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      width: 100%;
    }

    .ui.styled.fluid.accordion {
      width: 100% !important;
      box-shadow: 0 1px 2px 0 rgba(34,36,38,.15), 0 0 0 1px rgba(34,36,38,.15) !important;
    }

    @media only screen and (max-width: 850px) {
      .bib-main-container { min-width: 100%; width: 100%; }
      .group-controls { flex-direction: column; gap: 15px; align-items: stretch; }
    }
  </style>

  <style type="text/css">
    body > .ui.container {
      margin-top: 3em;
    }
    iframe {
      border: none;
      width: calc(100% + 2em);
      margin: 0em -1em;
      height: 300px;
    }
    iframe html {
      overflow: hidden;
    }
    iframe body {
      padding: 0em;
    }
    .ui.container > h1 {
      font-size: 3em;
      text-align: center;
      font-weight: normal;
    }
    .ui.container > h2.dividing.header {
      font-size: 2em;
      font-weight: normal;
      margin: 4em 0em 3em;
    }
    .ui.table {
      table-layout: fixed;
    }
    .ui.form .inline.fields {
      margin: 0.5em;
    }
    .ui.grid.message {
      background-color: #eeeeee;
      box-shadow: none;
      border-radius: 0;
    }
    .ui.grid.message .row {
      margin-top: 2.5em;
      margin-bottom: 2.5em;
    }
  </style>
</head>

  <body>

    <!-- Navigation Bar -->
    <div class="ui inverted fixed menu">
      <div class="ui container">
        <a class="ui item" href="#about">About</a>
        <a class="ui item" href="#news">News</a>
        <a class="ui item" href="#work">Research Grants</a>
        <a class="ui item" href="#project">Projects</a>
        <a class="ui item" href="#award">Awards</a>
        <a class="ui item" href="#service">Services</a>
        <a class="ui item" href="#teach">Teaching</a>
        <a class="ui item" href="#students">Students</a>
        <a class="ui item" href="#publications">Publications</a>
        <a class="ui item" href="#contact">Contact</a>
      </div>
    </div>

    <!-- Fixed navbar spacer -->
    <br /><br />

    <!-- Main Content Container -->
    <div class="ui container">
      <div class="bib-main-container">

        <!-- Sections (all visible at once, loaded via AJAX) -->
        <div id="about"></div>
        <div id="news"></div>
        <div id="work"></div>
        <div id="project"></div>
        <div id="award"></div>
        <div id="service"></div>
        <div id="teach"></div>
        <div id="students"></div>
        <div id="publications">
          <div class="ui block header">
            <div id="workshop" class="header">
              <i class="book icon"></i> Publications:
            </div>
          </div>
          <div class="group-controls" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
            <div class="ui icon input small" style="width: 300px;">
              <input type="text" id="bib-search" placeholder="Search title, author, or keyword..." onkeyup="handleSearchInput(this.value)">
              <i class="search icon"></i>
            </div>
            <div>
              <span style="margin-right:10px; font-weight:bold;">Group by:</span>
              <div class="ui buttons tiny">
                <button class="ui button active blue" id="btn-year" onclick="handleSwitch('year')">Year</button>
                <div class="or"></div>
                <button class="ui button" id="btn-type" onclick="handleSwitch('type')">Type</button>
              </div>
            </div>
          </div>
          <div id="bib-list-output" style="margin-top: 20px;"></div>
        </div>
        <div id="contact"></div>

        <div id="push"></div>
      </div>

      <div id="footer"></div>
    </div>

    <!-- Load all section content files, then initialize accordion and bib -->
    <script src="bibtexParse.js"></script>
    <script src="LocalBib.js"></script>
    <script>
      var myBib = null;

      jq200(document).ready(function() {
        jq200('#about').load('tabs/about.html');
        jq200('#news').load('tabs/news.html');
        jq200('#work').load('tabs/work.html');
        jq200('#project').load('tabs/project.html');
        jq200('#award').load('tabs/award.html');
        jq200('#service').load('tabs/service.html');
        jq200('#teach').load('tabs/teach.html');
        jq200('#students').load('tabs/students.html');
        jq200('#contact').load('tabs/contact.html', function() {
          jq200('.ui.accordion').accordion({duration: 'click'});
        });

        // Init bib after all AJAX content is loaded
        myBib = new LocalBib('bib-list-output');
        myBib.load('lihui.bib');

        // Smooth scroll when clicking nav links
        jq200('a[href^="#"]').on('click', function(e) {
          var targetId = jq200(this).attr('href');
          var target = jq200(targetId);
          if (target.length) {
            e.preventDefault();
            jq200('html, body').animate({
              scrollTop: target.offset().top - 70
            }, 400);
          }
        });
      });

      function handleSearchInput(val) {
        if (myBib) myBib.handleSearch(val);
      }

      function handleSwitch(mode) {
        if (!myBib) return;
        myBib.setGroupMode(mode);
      }
    </script>
  </body>
</html>
