<!DOCTYPE html>
<html lang="en">
  <head>
  <!-- Standard Meta -->
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

  <!-- Site Properties -->
  <title>Li Hui's academic homepage</title>
  <link rel="stylesheet" type="text/css" href="semantic.css">
  <link href="malos/stylesheets/pandoc-code-highlight.css" rel="stylesheet" type="text/css" />
  <link rel="stylesheet" href="bibstyle.css">
  <link rel='stylesheet prefetch' href='https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.4.1/components/icon.min.css'>
  <script src="jquery-3.2.1.js"></script>
  <script src="semantic.min.js"></script>
  <script> var jq200 = $.noConflict(); </script>
  <script src="library/iframe.js"></script>
  <script src="components/accordion.js"></script>

  <style>
    body {
      padding: 40px;
      background: #fafafa;
      overflow-y: scroll;
    }

    .bib-main-container {
      max-width: 1000px;
      width: 100%;
      margin: 0 auto;
      min-width: 800px;
      display: block;
    }

    .group-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      width: 100%;
    }

    .ui.styled.fluid.accordion {
      width: 100% !important;
      box-shadow: 0 1px 2px 0 rgba(34,36,38,.15), 0 0 0 1px rgba(34,36,38,.15) !important;
    }

    /* Smooth scroll offset for fixed navbar */
    .section-target {
      scroll-margin-top: 70px;
    }

    @media only screen and (max-width: 850px) {
      .bib-main-container { min-width: 100%; width: 100%; }
      .group-controls { flex-direction: column; gap: 15px; align-items: stretch; }
    }
  </style>

  <style type="text/css">
    body > .ui.container {
      margin-top: 3em;
    }
    iframe {
      border: none;
      width: calc(100% + 2em);
      margin: 0em -1em;
      height: 300px;
    }
    iframe html {
      overflow: hidden;
    }
    iframe body {
      padding: 0em;
    }
    .ui.container > h1 {
      font-size: 3em;
      text-align: center;
      font-weight: normal;
    }
    .ui.container > h2.dividing.header {
      font-size: 2em;
      font-weight: normal;
      margin: 4em 0em 3em;
    }
    .ui.table {
      table-layout: fixed;
    }
    .ui.form .inline.fields {
      margin: 0.5em;
    }
    .ui.grid.message {
      background-color: #eeeeee;
      box-shadow: none;
      border-radius: 0;
    }
    .ui.grid.message .row {
      margin-top: 2.5em;
      margin-bottom: 2.5em;
    }
  </style>
</head>

  <body>

    <!-- Navigation Bar -->
    <div class="ui inverted fixed menu">
      <div class="ui container">
        <a class="ui item" href="#about">About</a>
        <a class="ui item" href="#news">News</a>
        <a class="ui item" href="#work">Research Grants</a>
        <a class="ui item" href="#project">Projects</a>
        <a class="ui item" href="#award">Awards</a>
        <a class="ui item" href="#service">Services</a>
        <a class="ui item" href="#teach">Teaching</a>
        <a class="ui item" href="#students">Students</a>
        <a class="ui item" href="#publications">Publications</a>
        <a class="ui item" href="#contact">Contact</a>
      </div>
    </div>

    <!-- Fixed navbar spacer -->
    <br /><br />

    <!-- Main Content Container -->
    <div class="ui container">
      <div class="bib-main-container">

        <!-- Sections (loaded via AJAX, all visible at once) -->
        <div id="about"></div>
        <div id="news"></div>
        <div id="work"></div>
        <div id="project"></div>
        <div id="award"></div>
        <div id="service"></div>
        <div id="teach"></div>
        <div id="students"></div>
        <div id="publications"></div>
        <div id="contact"></div>

        <div id="push"></div>
      </div>

      <!-- Always-visible location map -->
      <div class="ui center aligned segment" style="margin-top: 40px;">
        <!-- OpenStreetMap static image -->
        <img
          src="https://static-maps.yandex.ru/1.x/?ll=108.988,34.230&z=14&l=map&size=600,350&pt=108.988,34.230,pm2rdm"
          alt="Xidian University Location"
          style="max-width:600px; width:100%; height:auto; margin:0 auto; display:block; border:1px solid #ddd;"
        />
        <p style="text-align:center; margin-top:8px; font-size:0.9em; color:#666;">
          <i class="map marker icon"></i> Xidian University, Xi'an, China
        </p>
      </div>

      <div id="footer"></div>
    </div>

    <!-- Load tab content files, then initialize UI -->
    <script>
      jq200(document).ready(function() {
        // Load all section content in parallel
        jq200('#about').load('tabs/about.html');
        jq200('#news').load('tabs/news.html');
        jq200('#work').load('tabs/work.html');
        jq200('#project').load('tabs/project.html');
        jq200('#award').load('tabs/award.html');
        jq200('#service').load('tabs/service.html');
        jq200('#teach').load('tabs/teach.html');
        jq200('#students').load('tabs/students.html');
        jq200('#publications').load('tabs/publications.html');
        jq200('#contact').load('tabs/contact.html', function() {
          jq200('.ui.accordion').accordion({duration: 'click'});
        });

        // Smooth scroll when clicking nav links (CSS scroll-margin-top handles the offset)
        jq200('a[href^="#"]').on('click', function(e) {
          var targetId = jq200(this).attr('href');
          var target = jq200(targetId);
          if (target.length) {
            e.preventDefault();
            jq200('html, body').animate({
              scrollTop: target.offset().top - 70
            }, 400);
          }
        });
      });
    </script>
  </body>
</html>
