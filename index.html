<!DOCTYPE html>
<html lang="en">
  <head>
  <!-- Standard Meta -->
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

  <!-- Site Properties -->
  <title>Li Hui's academic homepage</title>
  <link rel="stylesheet" type="text/css" href="semantic.css">
  <link href="malos/stylesheets/pandoc-code-highlight.css" rel="stylesheet" type="text/css" />
  <link rel="stylesheet" href="bibstyle.css">
  <link rel='stylesheet prefetch' href='https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.4.1/components/icon.min.css'>
  <script src="jquery-3.2.1.js"></script>
  <script src="semantic.min.js"></script>
  <script> var jq200 = $.noConflict(); </script>
  <script src="library/iframe.js"></script>
  <script src="components/accordion.js"></script>

  <style>
    body {
      padding: 40px;
      background: #fafafa;
      overflow-y: scroll;
    }

    .bib-main-container {
      max-width: 1000px;
      width: 100%;
      margin: 0 auto;
      min-width: 800px;
      display: block;
    }

    .group-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      width: 100%;
    }

    .ui.styled.fluid.accordion {
      width: 100% !important;
      box-shadow: 0 1px 2px 0 rgba(34,36,38,.15), 0 0 0 1px rgba(34,36,38,.15) !important;
    }

    /* Tab sections — all hidden by default except active one */
    .tab-section {
      display: none;
    }
    .tab-section.active {
      display: block;
    }

    /* Nav active state */
    .nav-tab.active {
      background: rgba(255,255,255,0.1) !important;
      font-weight: bold;
    }

    @media only screen and (max-width: 850px) {
      .bib-main-container { min-width: 100%; width: 100%; }
      .group-controls { flex-direction: column; gap: 15px; align-items: stretch; }
    }
  </style>

  <style type="text/css">
    body > .ui.container {
      margin-top: 3em;
    }
    iframe {
      border: none;
      width: calc(100% + 2em);
      margin: 0em -1em;
      height: 300px;
    }
    iframe html {
      overflow: hidden;
    }
    iframe body {
      padding: 0em;
    }
    .ui.container > h1 {
      font-size: 3em;
      text-align: center;
      font-weight: normal;
    }
    .ui.container > h2.dividing.header {
      font-size: 2em;
      font-weight: normal;
      margin: 4em 0em 3em;
    }
    .ui.table {
      table-layout: fixed;
    }
    .ui.form .inline.fields {
      margin: 0.5em;
    }
    .ui.grid.message {
      background-color: #eeeeee;
      box-shadow: none;
      border-radius: 0;
    }
    .ui.grid.message .row {
      margin-top: 2.5em;
      margin-bottom: 2.5em;
    }
  </style>
</head>

  <body>

    <!-- Navigation Bar -->
    <div class="ui inverted fixed menu">
      <div class="ui container">
        <a class="ui item nav-tab active" href="#" data-tab="about">About</a>
        <a class="ui item nav-tab" href="#" data-tab="news">News</a>
        <a class="ui item nav-tab" href="#" data-tab="work">Research Grants</a>
        <a class="ui item nav-tab" href="#" data-tab="project">Projects</a>
        <a class="ui item nav-tab" href="#" data-tab="award">Awards</a>
        <a class="ui item nav-tab" href="#" data-tab="service">Services</a>
        <a class="ui item nav-tab" href="#" data-tab="teach">Teaching</a>
        <a class="ui item nav-tab" href="#" data-tab="students">Students</a>
        <a class="ui item nav-tab" href="#" data-tab="publications">Publications</a>
        <a class="ui item nav-tab" href="#" data-tab="contact">Contact</a>
      </div>
    </div>

    <!-- Fixed navbar spacer -->
    <br /><br />

    <!-- Main Content Container -->
    <div class="ui container">
      <div class="bib-main-container">

        <!-- Tab Sections (loaded via AJAX) -->
        <div id="sec-about"    class="tab-section active"></div>
        <div id="sec-news"     class="tab-section"></div>
        <div id="sec-work"     class="tab-section"></div>
        <div id="sec-project"  class="tab-section"></div>
        <div id="sec-award"    class="tab-section"></div>
        <div id="sec-service"  class="tab-section"></div>
        <div id="sec-teach"     class="tab-section"></div>
        <div id="sec-students"  class="tab-section"></div>
        <div id="sec-publications" class="tab-section"></div>
        <div id="sec-contact"   class="tab-section"></div>

        <div id="push"></div>
      </div>

      <!-- Always-visible location map (outside tab system so it renders on load) -->
      <div class="ui center aligned segment" style="margin-top: 40px;">
        <!-- OpenStreetMap static image — no HTTPS/TLS required, works on all systems -->
        <img
          src="https://static-maps.yandex.ru/1.x/?ll=108.988,34.230&z=14&l=map&size=600,350&pt=108.988,34.230,pm2rdm"
          alt="Xidian University Location"
          style="max-width:600px; width:100%; height:auto; margin:0 auto; display:block; border:1px solid #ddd;"
        />
        <p style="text-align:center; margin-top:8px; font-size:0.9em; color:#666;">
          <i class="map marker icon"></i> Xidian University, Xi'an, China
        </p>
      </div>

      <div id="footer"></div>
    </div>

    <!-- Load tab content files, then initialize UI -->
    <script>
      jq200(document).ready(function() {
        // Load all tab content in parallel
        jq200('#sec-about').load('tabs/about.html');
        jq200('#sec-news').load('tabs/news.html');
        jq200('#sec-work').load('tabs/work.html');
        jq200('#sec-project').load('tabs/project.html');
        jq200('#sec-award').load('tabs/award.html');
        jq200('#sec-service').load('tabs/service.html');
        jq200('#sec-teach').load('tabs/teach.html');
        jq200('#sec-students').load('tabs/students.html');
        jq200('#sec-publications').load('tabs/publications.html');
        jq200('#sec-contact').load('tabs/contact.html', function() {
          jq200('.ui.accordion').accordion({duration: 'click'});
        });

        // Tab switching logic
        jq200('.nav-tab').on('click', function(e) {
          e.preventDefault();
          var tab = jq200(this).data('tab');

          // Switch active nav item
          jq200('.nav-tab').removeClass('active');
          jq200(this).addClass('active');

          // Show corresponding section
          jq200('.tab-section').removeClass('active');
          jq200('#sec-' + tab).addClass('active');

          // Scroll to top
          jq200('html, body').animate({ scrollTop: 0 }, 300);
        });
      });
    </script>
  </body>
</html>
